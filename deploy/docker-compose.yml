services:
  cli:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m app.main cli
    stdin_open: true
    tty: true
    env_file:
      - ../.env
    volumes:
      - ..:/app

  validate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m tests.agent_validation.validate
    env_file:
      - ../.env
    volumes:
      - ..:/app
