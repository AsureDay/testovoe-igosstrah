services:
  cli:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python cli.py
    stdin_open: true
    tty: true
    env_file:
      - ../.env
    volumes:
      - ..:/app

  validate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python agent_validation/validate.py
    env_file:
      - ../.env
    volumes:
      - ..:/app
